name: Static Site CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.38.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          command: site
