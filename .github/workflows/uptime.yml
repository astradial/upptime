name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: astradial/uptime-monitor@v1.41.1-astradial
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
