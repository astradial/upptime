name: Summary CI
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: astradial/uptime-monitor@v1.41.1-astradial
        with:
          command: summary
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
